<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>QuoteVerse | Daily Inspiration</title>

    <meta 
    name="description" 
    content="QuoteVerse is a modern inspirational quote generator built using HTML, CSS and JavaScript."
    >


    <!-- Google Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link 
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" 
    rel="stylesheet">


    <!-- CSS -->

    <link rel="stylesheet" href="css/style.css">


</head>


<body>


<main class="container">


    <section class="quote-card">


        <h1>
            ✨ QuoteVerse
        </h1>


        <p class="subtitle">
            Your daily dose of inspiration
        </p>



        <!-- Category -->

        <div id="category">
            Motivation
        </div>




        <!-- Quote -->

        <blockquote id="quote">

            Loading quote...

        </blockquote>




        <!-- Author -->

        <p id="author">

            — Unknown

        </p>




        <!-- Buttons -->


        <div class="buttons">


            <button id="newQuoteBtn">

                🎲 New Quote

            </button>



            <button id="copyBtn">

                📋 Copy

            </button>



            <button id="shareBtn">

                📤 Share

            </button>



            <button id="darkBtn">

                🌙 Dark Mode

            </button>



        </div>



    </section>


</main>




<!-- JavaScript -->

<script src="js/quotes.js"></script>

<script src="js/script.js"></script>



</body>


</html>
